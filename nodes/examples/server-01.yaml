---
# Example server (control plane) node definition.
# Copy this file to nodes/lab/ and customise for your hardware.
hostname: server-01
role: server
installDevice: /dev/sda
environment: lab
registrationGroup: lab-registration

labels:
  node-type: control-plane

taints:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

# SSH keys are managed externally via Kubernetes Secrets.
# The secret name is resolved from the cluster config for this environment.
# Override per node only if this node requires a different key set.
# sshKeySecretRef:
#   name: lab-ssh-authorized-keys
#   namespace: fleet-default

tailscale:
  enabled: false
  # authKeySecretName: tailscale-auth-key
