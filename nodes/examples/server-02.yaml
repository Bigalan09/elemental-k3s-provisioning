---
# Example second server node definition.
# In this homelab there is only one server (mini-pc), but this shows
# what a second server would look like if you ever expand.
hostname: server-02
role: server
installDevice: /dev/sda
environment: lab
registrationGroup: lab-registration

labels:
  node-type: control-plane

taints:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

# SSH keys are managed externally via Kubernetes Secrets.
# sshKeySecretRef:
#   name: lab-ssh-authorized-keys
#   namespace: fleet-default

tailscale:
  enabled: false
  # authKeySecretName: tailscale-auth-key
