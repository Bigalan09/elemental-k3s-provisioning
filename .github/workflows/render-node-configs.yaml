---
name: Render node configs

on:
  workflow_dispatch:
    inputs:
      target:
        description: >
          Path to a single node definition file (e.g. nodes/examples/server-01.yaml),
          an environment name (lab, staging, production, examples), or "all".
        required: true
        default: all

jobs:
  render:
    name: Render node configuration artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.1"
          curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Render node configs
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "${TARGET}" = "all" ]; then
            bash scripts/render.sh --all
          elif [ -f "${TARGET}" ]; then
            bash scripts/render.sh "${TARGET}"
          else
            bash scripts/render.sh --env "${TARGET}"
          fi

      - name: Upload rendered artefacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-node-configs
          path: dist/
          if-no-files-found: error
