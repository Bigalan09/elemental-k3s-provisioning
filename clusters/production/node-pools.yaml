---
# Node pool definitions for the production cluster.
# These describe the expected composition of server and agent node pools.
# Actual node registration is driven by Elemental MachineRegistration resources.

nodePools:
  servers:
    role: server
    minNodes: 3
    maxNodes: 5
    installDevice: /dev/sda
    labels:
      environment: production
      node-type: control-plane
    taints:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule

  agents:
    role: agent
    minNodes: 2
    maxNodes: 20
    installDevice: /dev/sda
    labels:
      environment: production
      node-type: worker
    taints: []
