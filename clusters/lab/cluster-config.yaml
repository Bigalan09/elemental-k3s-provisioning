---
# Cluster-level configuration for the lab K3s cluster.
# This document describes the cluster identity and general settings.
# Apply this to the Rancher management cluster to define the cluster record.

clusterName: lab
kubernetesVersion: v1.29.4+k3s1
namespace: fleet-default

# The registration endpoint is provided by Rancher OS Manager after the operator is installed.
# Replace with the actual registration URL from your management cluster.
registrationEndpoint: "https://rancher.lab.internal/v1/elemental/registration"

# Token reference for node registration.
# Create a Kubernetes Secret in the management cluster:
#   kubectl create secret generic lab-registration-token \
#     --namespace fleet-default \
#     --from-literal=token=<your-registration-token>
registrationTokenSecretRef:
  name: lab-registration-token
  namespace: fleet-default

# SSH key secret reference for all nodes in this environment.
# Create a Kubernetes Secret containing authorised public keys:
#   kubectl create secret generic lab-ssh-authorized-keys \
#     --namespace fleet-default \
#     --from-file=authorized_keys=/path/to/authorized_keys
sshKeySecretRef:
  name: lab-ssh-authorized-keys
  namespace: fleet-default
