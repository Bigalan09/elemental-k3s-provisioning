---
# Node pool definitions for the lab cluster.
# This homelab uses one control plane (mini-pc) and three workers
# (zimablade, zimaboard-1, zimaboard-2).
# Actual node registration is driven by Elemental MachineRegistration resources.

nodePools:
  servers:
    role: server
    minNodes: 1
    maxNodes: 1
    installDevice: /dev/sda
    labels:
      environment: lab
      node-type: control-plane
    taints:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule

  agents:
    role: agent
    minNodes: 3
    maxNodes: 3
    installDevice: /dev/sda
    labels:
      environment: lab
      node-type: worker
    taints: []
