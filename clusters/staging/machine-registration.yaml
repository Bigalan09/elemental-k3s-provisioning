---
# Staging MachineRegistration resource.
# Apply this manifest to the Rancher management cluster (fleet-default namespace).
#
# SSH public keys must be provided via the referenced Kubernetes Secret
# before this resource is created. See docs/bootstrap.md for the full bootstrap flow.

apiVersion: elemental.cattle.io/v1beta1
kind: MachineRegistration
metadata:
  name: staging-registration
  namespace: fleet-default
  labels:
    elemental.cattle.io/cluster: staging
spec:
  machineInventoryLabels:
    elemental.cattle.io/cluster: staging
    elemental.cattle.io/managed: "true"
  config:
    cloud-init:
      users:
        - name: root
          # SSH keys are injected at apply time from the secret referenced in
          # cluster-config.yaml (sshKeySecretRef). Do not commit real keys here.
          ssh_authorized_keys: []
    elemental:
      install:
        device: /dev/sda
        reboot: true
        powerOff: false
      registration:
        emulateTPM: false
  machineInventorySelectorTemplate:
    spec:
      selector:
        matchLabels:
          elemental.cattle.io/cluster: staging
