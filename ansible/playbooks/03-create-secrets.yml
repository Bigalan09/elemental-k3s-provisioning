---
# 03-create-secrets.yml — Create Kubernetes secrets for SSH keys and registration tokens.
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/03-create-secrets.yml

- name: Create Kubernetes secrets
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    KUBECONFIG: "{{ local_kubeconfig }}"
  tasks:
    - name: Ensure fleet-default namespace exists
      ansible.builtin.command:
        cmd: kubectl get namespace {{ fleet_namespace }}
      register: fleet_ns
      failed_when: false
      changed_when: false

    - name: Create fleet-default namespace if missing
      when: fleet_ns.rc != 0
      ansible.builtin.command:
        cmd: kubectl create namespace {{ fleet_namespace }}
      changed_when: true

    # --- SSH authorized keys ---
    - name: Resolve SSH public key path
      ansible.builtin.set_fact:
        ssh_key_path: "{{ ssh_public_key_path | expanduser }}"

    - name: Check SSH public key exists
      ansible.builtin.stat:
        path: "{{ ssh_key_path }}"
      register: ssh_key_stat

    - name: Fail if SSH public key not found
      when: not ssh_key_stat.stat.exists
      ansible.builtin.fail:
        msg: >-
          SSH public key not found at {{ ssh_key_path }}.
          Set ssh_public_key_path in group_vars/all.yml.

    - name: Check if SSH key secret exists
      ansible.builtin.command:
        cmd: kubectl get secret lab-ssh-authorized-keys -n {{ fleet_namespace }}
      register: ssh_secret_exists
      failed_when: false
      changed_when: false

    - name: Create SSH authorized keys secret
      when: ssh_secret_exists.rc != 0
      ansible.builtin.command:
        cmd: >-
          kubectl create secret generic lab-ssh-authorized-keys
          --namespace {{ fleet_namespace }}
          --from-file=ssh-authorized-keys={{ ssh_key_path }}
      changed_when: true

    # --- Registration token ---
    - name: Check if registration token secret exists
      ansible.builtin.command:
        cmd: kubectl get secret lab-registration-token -n {{ fleet_namespace }}
      register: reg_token_exists
      failed_when: false
      changed_when: false

    - name: Generate registration token
      when: reg_token_exists.rc != 0
      ansible.builtin.command:
        cmd: openssl rand -hex 32
      register: reg_token
      changed_when: false

    - name: Create registration token secret
      when: reg_token_exists.rc != 0
      ansible.builtin.command:
        cmd: >-
          kubectl create secret generic lab-registration-token
          --namespace {{ fleet_namespace }}
          --from-literal=token={{ reg_token.stdout }}
      changed_when: true

    - name: List secrets in fleet-default
      ansible.builtin.command:
        cmd: kubectl get secrets -n {{ fleet_namespace }}
      register: secrets_list
      changed_when: false

    - name: Show created secrets
      ansible.builtin.debug:
        msg: "{{ secrets_list.stdout_lines }}"
