---
# Homelab inventory
#
# Update the ansible_host values with the actual IP addresses of your machines.
# These IPs are assigned by your home router via DHCP or static configuration.

all:
  children:
    control_plane:
      hosts:
        mini-pc:
          ansible_host: 192.168.1.100
          # If the mini PC uses NVMe instead of SATA, change to /dev/nvme0n1
          install_device: /dev/sda
          node_role: server

    workers:
      hosts:
        zimablade:
          ansible_host: 192.168.1.101
          install_device: /dev/sda
          node_role: agent

        zimaboard-1:
          ansible_host: 192.168.1.102
          install_device: /dev/sda
          node_role: agent

        zimaboard-2:
          ansible_host: 192.168.1.103
          install_device: /dev/sda
          node_role: agent

    # All cluster nodes
    cluster:
      children:
        control_plane:
        workers:
